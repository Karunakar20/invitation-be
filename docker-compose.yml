
services:
  user_db:
    image: postgres:16
    container_name: wedding_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT:-6000}:5432"
    volumes:
      - wedding_db_data:/var/lib/postgresql/data

volumes:
  wedding_db_data: